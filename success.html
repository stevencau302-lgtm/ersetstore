<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | ERSET GEAR LAB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <section style="padding-top: 40px">
    <div class="container">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <h2>Order Confirmed!</h2>
        <p>Thank you for shopping at ERSET GEAR LAB. Your order is being processed and will be shipped soon.</p>

        <div class="order-info" id="orderInfo"></div>

        <div style="background:rgba(0,255,157,0.05); border:1px solid rgba(0,255,157,0.2); color:var(--accent); padding:16px; border-radius:12px; font-size:13px; margin-bottom:28px; text-align:left">
          <strong>📧 Confirmation email sent</strong><br>
          <span style="color:var(--text-muted)">Check your email for order details and payment instructions.</span>
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
          <a href="index.html" class="btn btn-secondary">Back to Home</a>
          <a href="products.html" class="btn btn-primary">Continue Shopping</a>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderId = new URLSearchParams(window.location.search).get('order');
      const data = JSON.parse(localStorage.getItem('erset_last_order') || '{}');

      const date = new Date(data.date || Date.now());
      const dateStr = date.toLocaleDateString('en-US', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      document.getElementById('orderInfo').innerHTML = `
        <div class="row"><span>Order ID</span> <span style="color:var(--accent)">#${orderId || data.id || 'ERS-XXXX'}</span></div>
        <div class="row"><span>Date</span> <span>${dateStr}</span></div>
        <div class="row"><span>Items</span> <span>${data.items || 0} products</span></div>
        <div class="row"><span>Shipping</span> <span>${data.shipping ? data.shipping.name : '-'}</span></div>
        <div class="row"><span>ETA</span> <span>${data.shipping ? data.shipping.eta : '-'}</span></div>
        <div class="row"><span>Payment</span> <span>${data.payment ? data.payment.icon + ' ' + data.payment.name : '-'}</span></div>
        <div class="row" style="border-top:1px dashed var(--border-light); padding-top:12px; margin-top:8px"><span style="font-weight:700">Total Paid</span> <span style="font-size:20px; font-weight:800; color:var(--accent)">${formatPrice(data.total || 0)}</span></div>
      `;
    });
  </script>
</body>
</html>
