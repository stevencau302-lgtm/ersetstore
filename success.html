<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan Berhasil | ERSET STORE</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <section style="padding-top: 32px">
    <div class="container">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <h2>Pesanan Berhasil!</h2>
        <p>Terima kasih telah berbelanja di ERSET STORE. Pesanan Anda sedang kami proses dan akan segera dikirim.</p>

        <div class="order-info" id="orderInfo"></div>

        <div style="background:var(--primary-light); color:var(--primary-dark); padding:16px; border-radius:12px; font-size:13px; margin-bottom:24px">
          <strong>📧 Email konfirmasi telah dikirim</strong><br>
          Silakan cek email Anda untuk detail pesanan dan instruksi pembayaran.
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap">
          <a href="index.html" class="btn btn-secondary">Kembali ke Beranda</a>
          <a href="products.html" class="btn btn-primary">Lanjut Belanja</a>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderId = new URLSearchParams(window.location.search).get('order');
      const data = JSON.parse(localStorage.getItem('erset_last_order') || '{}');

      const date = new Date(data.date || Date.now());
      const dateStr = date.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      document.getElementById('orderInfo').innerHTML = `
        <div class="row"><span>No. Pesanan:</span> <span style="color:var(--primary)">#${orderId || data.id || 'ERS-XXXX'}</span></div>
        <div class="row"><span>Tanggal:</span> <span>${dateStr}</span></div>
        <div class="row"><span>Jumlah Item:</span> <span>${data.items || 0} produk</span></div>
        <div class="row"><span>Pengiriman:</span> <span>${data.shipping ? data.shipping.name : '-'}</span></div>
        <div class="row"><span>Estimasi:</span> <span>${data.shipping ? data.shipping.eta : '-'}</span></div>
        <div class="row"><span>Pembayaran:</span> <span>${data.payment ? data.payment.icon + ' ' + data.payment.name : '-'}</span></div>
        <div class="row" style="border-top:1.5px dashed var(--border); padding-top:10px; margin-top:8px"><span style="font-weight:700">Total Pembayaran:</span> <span style="font-size:18px; font-weight:800; color:var(--primary)">${formatPrice(data.total || 0)}</span></div>
      `;
    });
  </script>
</body>
</html>
