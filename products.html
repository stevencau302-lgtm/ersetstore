<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop All Gear | ERSET GEAR LAB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header" data-page="products"></div>

  <div class="page-header">
    <div class="container">
      <h1 id="pageTitle">All Gear</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <span id="pageBreadcrumb">All Gear</span>
      </div>
    </div>
  </div>

  <section style="padding-top: 0">
    <div class="container">
      <div class="shop-layout">
        <aside class="shop-sidebar">
          <div class="filter-group">
            <h5>Category</h5>
            <label><input type="radio" name="category" value="all" checked /> All Categories</label>
            <div id="categoryFilters"></div>
          </div>
          <div class="filter-group">
            <h5>Price Range</h5>
            <label><input type="radio" name="price" value="all" checked /> All Prices</label>
            <label><input type="radio" name="price" value="0-100000" /> Under Rp 100K</label>
            <label><input type="radio" name="price" value="100000-300000" /> Rp 100K - 300K</label>
            <label><input type="radio" name="price" value="300000-500000" /> Rp 300K - 500K</label>
            <label><input type="radio" name="price" value="500000-1000000" /> Rp 500K - 1M</label>
            <label><input type="radio" name="price" value="1000000-99999999" /> Above Rp 1M</label>
          </div>
          <div class="filter-group">
            <h5>Rating</h5>
            <label><input type="radio" name="rating" value="all" checked /> All Ratings</label>
            <label><input type="radio" name="rating" value="4.5" /> ⭐ 4.5+</label>
            <label><input type="radio" name="rating" value="4.0" /> ⭐ 4.0+</label>
          </div>
          <div class="filter-group">
            <h5>Promo</h5>
            <label><input type="checkbox" id="filterSale" /> On Sale</label>
            <label><input type="checkbox" id="filterNew" /> New Arrivals</label>
          </div>
          <button class="btn btn-secondary btn-block btn-sm" onclick="resetFilters()">Reset Filter</button>
        </aside>

        <div>
          <div class="shop-toolbar">
            <div>
              Showing <strong style="color:var(--text)" id="resultCount">0</strong> products
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span>Sort by:</span>
              <select id="sortBy">
                <option value="default">Most Relevant</option>
                <option value="newest">Newest</option>
                <option value="popular">Best Selling</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Top Rated</option>
              </select>
            </div>
          </div>

          <div class="products-grid" id="productsGrid"></div>

          <div id="emptyState" class="empty-state" style="display:none">
            <div class="icon">🔍</div>
            <h3>No Products Found</h3>
            <p>Try adjusting your filters or search keywords</p>
            <button class="btn btn-primary" onclick="resetFilters()">Reset Filters</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    let currentFilter = { category: 'all', price: 'all', rating: 'all', sale: false, new: false, sort: 'default', search: '' };

    document.addEventListener('DOMContentLoaded', () => {
      // Build category filter
      const catFilters = document.getElementById('categoryFilters');
      catFilters.innerHTML = CATEGORIES.map(c =>
        `<label><input type="radio" name="category" value="${c.id}" /> ${c.icon} ${c.name} <span style="margin-left:auto; color:var(--text-muted); font-size:12px">(${c.count})</span></label>`
      ).join('');

      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      const search = params.get('search');
      if (cat) {
        currentFilter.category = cat;
        const radio = document.querySelector(`input[name="category"][value="${cat}"]`);
        if (radio) radio.checked = true;
        const catObj = CATEGORIES.find(c => c.id === cat);
        if (catObj) {
          document.getElementById('pageTitle').textContent = catObj.icon + ' ' + catObj.name;
          document.getElementById('pageBreadcrumb').textContent = catObj.name;
        }
      }
      if (search) {
        currentFilter.search = search;
        document.getElementById('pageTitle').textContent = 'Search: "' + search + '"';
        document.getElementById('pageBreadcrumb').textContent = 'Search';
      }

      // Listen filter changes
      document.querySelectorAll('input[name="category"]').forEach(r => r.addEventListener('change', e => { currentFilter.category = e.target.value; render(); }));
      document.querySelectorAll('input[name="price"]').forEach(r => r.addEventListener('change', e => { currentFilter.price = e.target.value; render(); }));
      document.querySelectorAll('input[name="rating"]').forEach(r => r.addEventListener('change', e => { currentFilter.rating = e.target.value; render(); }));
      document.getElementById('filterSale').addEventListener('change', e => { currentFilter.sale = e.target.checked; render(); });
      document.getElementById('filterNew').addEventListener('change', e => { currentFilter.new = e.target.checked; render(); });
      document.getElementById('sortBy').addEventListener('change', e => { currentFilter.sort = e.target.value; render(); });

      render();
    });

    function render() {
      let list = [...PRODUCTS];

      if (currentFilter.search) {
        const q = currentFilter.search.toLowerCase();
        list = list.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
      }
      if (currentFilter.category !== 'all') list = list.filter(p => p.category === currentFilter.category);
      if (currentFilter.price !== 'all') {
        const [min, max] = currentFilter.price.split('-').map(Number);
        list = list.filter(p => p.price >= min && p.price <= max);
      }
      if (currentFilter.rating !== 'all') {
        const min = parseFloat(currentFilter.rating);
        list = list.filter(p => p.rating >= min);
      }
      if (currentFilter.sale) list = list.filter(p => p.badge === 'sale');
      if (currentFilter.new) list = list.filter(p => p.badge === 'new');

      switch (currentFilter.sort) {
        case 'price-asc': list.sort((a, b) => a.price - b.price); break;
        case 'price-desc': list.sort((a, b) => b.price - a.price); break;
        case 'rating': list.sort((a, b) => b.rating - a.rating); break;
        case 'popular': list.sort((a, b) => b.sold - a.sold); break;
        case 'newest': list.sort((a, b) => b.id - a.id); break;
      }

      const grid = document.getElementById('productsGrid');
      const empty = document.getElementById('emptyState');
      document.getElementById('resultCount').textContent = list.length;

      if (list.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        grid.innerHTML = list.map(renderProductCard).join('');
      }
    }

    function resetFilters() {
      currentFilter = { category: 'all', price: 'all', rating: 'all', sale: false, new: false, sort: 'default', search: '' };
      document.querySelector('input[name="category"][value="all"]').checked = true;
      document.querySelector('input[name="price"][value="all"]').checked = true;
      document.querySelector('input[name="rating"][value="all"]').checked = true;
      document.getElementById('filterSale').checked = false;
      document.getElementById('filterNew').checked = false;
      document.getElementById('sortBy').value = 'default';
      document.getElementById('pageTitle').textContent = 'All Gear';
      document.getElementById('pageBreadcrumb').textContent = 'All Gear';
      render();
    }
  </script>
</body>
</html>
