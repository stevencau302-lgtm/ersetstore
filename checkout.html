<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | ERSET GEAR LAB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>💳 Checkout</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <a href="cart.html">Cart</a>
        <span class="sep">/</span>
        <span>Checkout</span>
      </div>
    </div>
  </div>

  <section style="padding-top: 0">
    <div class="container">
      <div id="checkoutContent"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    // ============================================
    // BINDERBYTE API INTEGRATION - ONGKIR DINAMIS
    // ============================================
    const BINDERBYTE_API_KEY = '2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d'; // Ganti dengan API key kamu dari binderbyte.com
    const BINDERBYTE_BASE = 'https://api.binderbyte.com/v1';

    // Origin city (toko kamu) — Jakarta Selatan (ID: 152)
    const ORIGIN_CITY_ID = '152';

    let selectedShipping = null;
    let selectedPayment = 'bca';
    let selectedProvince = '';
    let selectedCity = '';
    let provinces = [];
    let cities = [];
    let availableShippings = [];
    let isLoadingProvinces = false;
    let isLoadingCities = false;
    let isLoadingOngkir = false;

    // ===== API CALLS =====

    async function fetchProvinces() {
      console.log('[ongkir] fetchProvinces called');
      isLoadingProvinces = true;
      render();
      try {
        const res = await fetch(`${BINDERBYTE_BASE}/list_province?api_key=${BINDERBYTE_API_KEY}`);
        const data = await res.json();
        console.log('[ongkir] Provinces response:', data);
        if (data.status === 200 && data.data) {
          provinces = data.data;
        } else {
          console.error('[ongkir] Failed to fetch provinces:', data);
          showToast('Gagal memuat data provinsi', 'error');
        }
      } catch (err) {
        console.error('[ongkir] Error fetching provinces:', err);
        showToast('Error koneksi ke API ongkir', 'error');
      }
      isLoadingProvinces = false;
      render();
    }

    async function fetchCities(provinceId) {
      console.log('[ongkir] fetchCities called with provinceId:', provinceId);
      isLoadingCities = true;
      cities = [];
      selectedCity = '';
      availableShippings = [];
      selectedShipping = null;
      render();
      try {
        const res = await fetch(`${BINDERBYTE_BASE}/list_city?api_key=${BINDERBYTE_API_KEY}&province_id=${provinceId}`);
        const data = await res.json();
        console.log('[ongkir] Cities response:', data);
        if (data.status === 200 && data.data) {
          cities = data.data;
        } else {
          console.error('[ongkir] Failed to fetch cities:', data);
          showToast('Gagal memuat data kota', 'error');
        }
      } catch (err) {
        console.error('[ongkir] Error fetching cities:', err);
        showToast('Error koneksi ke API ongkir', 'error');
      }
      isLoadingCities = false;
      render();
    }

    async function fetchOngkir(destinationCityId, courier) {
      console.log('[ongkir] fetchOngkir called — destination:', destinationCityId, 'courier:', courier);
      isLoadingOngkir = true;
      render();
      try {
        const res = await fetch(`${BINDERBYTE_BASE}/cost?api_key=${BINDERBYTE_API_KEY}&origin=${ORIGIN_CITY_ID}&destination=${destinationCityId}&weight=1000&courier=${courier}`);
        const data = await res.json();
        console.log('[ongkir] Ongkir response:', data);
        if (data.status === 200 && data.data) {
          return data.data;
        } else {
          console.error('[ongkir] Failed to fetch ongkir:', data);
          return null;
        }
      } catch (err) {
        console.error('[ongkir] Error fetching ongkir:', err);
        return null;
      }
    }

    // ===== HANDLERS =====

    // Called when province destination changes
    async function handleDestinationChange(provinceId) {
      console.log('[ongkir] handleDestinationChange called with provinceId:', provinceId);

      const prov = provinces.find(p => p.id === provinceId || p.province_id === provinceId);
      selectedProvince = prov ? (prov.name || prov.province) : provinceId;
      console.log('[ongkir] Selected province name:', selectedProvince);

      // Reset downstream
      selectedCity = '';
      availableShippings = [];
      selectedShipping = null;

      if (provinceId) {
        await fetchCities(provinceId);
      } else {
        cities = [];
        render();
      }
    }

    // Called when city changes — fetch ongkir for all couriers
    async function handleCityChange(cityId) {
      console.log('[ongkir] handleCityChange called with cityId:', cityId);

      const city = cities.find(c => c.id === cityId || c.city_id === cityId);
      selectedCity = city ? (city.name || city.city_name) : cityId;
      console.log('[ongkir] Selected city:', selectedCity);

      availableShippings = [];
      selectedShipping = null;
      isLoadingOngkir = true;
      render();

      // Fetch all couriers in parallel
      const couriers = ['jne', 'tiki', 'pos'];
      const results = await Promise.all(couriers.map(c => fetchOngkir(cityId, c)));

      console.log('[ongkir] All courier results:', results);

      // Parse results into flat shipping options
      availableShippings = [];
      results.forEach((result, idx) => {
        if (result && result.costs) {
          result.costs.forEach(service => {
            availableShippings.push({
              id: `${couriers[idx]}_${service.service}`,
              courier: couriers[idx].toUpperCase(),
              name: `${couriers[idx].toUpperCase()} ${service.service}`,
              description: service.description || '',
              eta: service.cost?.[0]?.etd || '-',
              price: service.cost?.[0]?.value || 0,
            });
          });
        } else if (result && Array.isArray(result)) {
          // Alternative response format
          result.forEach(item => {
            if (item.costs) {
              item.costs.forEach(service => {
                availableShippings.push({
                  id: `${item.code || couriers[idx]}_${service.service}`,
                  courier: (item.code || couriers[idx]).toUpperCase(),
                  name: `${(item.code || couriers[idx]).toUpperCase()} ${service.service}`,
                  description: service.description || '',
                  eta: service.cost?.[0]?.etd || '-',
                  price: service.cost?.[0]?.value || 0,
                });
              });
            }
          });
        }
      });

      console.log('[ongkir] Parsed shipping options:', availableShippings);

      // Auto-select cheapest
      if (availableShippings.length > 0) {
        selectedShipping = availableShippings.reduce((min, s) => s.price < min.price ? s : min, availableShippings[0]);
        console.log('[ongkir] Auto-selected cheapest:', selectedShipping);
      }

      isLoadingOngkir = false;
      render();
    }

    // Called when user selects a shipping method
    function handleSelect(shippingId) {
      console.log('[ongkir] handleSelect called with:', shippingId);

      const found = availableShippings.find(s => s.id === shippingId);
      if (found) {
        selectedShipping = found;
        console.log('[ongkir] Selected shipping updated to:', selectedShipping);
      } else {
        console.warn('[ongkir] Shipping not found for id:', shippingId);
      }
      render();
    }

    const PAYMENTS = [
      { id: 'bca', icon: '🏦', name: 'BCA Virtual Account', desc: 'Pay via BCA m-Banking / KlikBCA' },
      { id: 'mandiri', icon: '🏛️', name: 'Mandiri Virtual Account', desc: 'Pay via Mandiri Online / Livin' },
      { id: 'bni', icon: '🏦', name: 'BNI Virtual Account', desc: 'Pay via BNI Mobile' },
      { id: 'gopay', icon: '💚', name: 'GoPay', desc: 'Pay via Gojek app' },
      { id: 'ovo', icon: '💜', name: 'OVO', desc: 'Pay via OVO app' },
      { id: 'dana', icon: '💙', name: 'DANA', desc: 'Pay via DANA app' },
      { id: 'qris', icon: '📱', name: 'QRIS', desc: 'Scan QR with any e-wallet' },
      { id: 'cod', icon: '💵', name: 'Cash on Delivery (COD)', desc: 'Pay when your order arrives' },
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      const items = Cart.get();
      if (items.length === 0) {
        document.getElementById('checkoutContent').innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Your Cart Is Empty</h3>
            <p>Add some gear to checkout</p>
            <a href="products.html" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }
      render();
      await fetchProvinces();
    });

    function render() {
      const items = Cart.get();
      const subtotal = Cart.total();
      const shipping = selectedShipping ? selectedShipping.price : 0;
      const total = subtotal + shipping;

      document.getElementById('checkoutContent').innerHTML = `
        <div class="checkout-layout">
          <form id="checkoutForm" onsubmit="placeOrder(event)">
            <!-- Step 1 -->
            <div class="checkout-section">
              <h3><span class="step-num">1</span> Contact Information</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Name *</label>
                  <input type="text" required placeholder="John Doe" />
                </div>
                <div class="form-group">
                  <label>Email *</label>
                  <input type="email" required placeholder="email@example.com" />
                </div>
                <div class="form-group">
                  <label>Phone / WhatsApp *</label>
                  <input type="tel" required placeholder="08xxxxxxxxxx" />
                </div>
              </div>
            </div>

            <!-- Step 2: Shipping Address + Ongkir -->
            <div class="checkout-section">
              <h3><span class="step-num">2</span> Shipping Address</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Address *</label>
                  <textarea required placeholder="Street name, house number, RT/RW..."></textarea>
                </div>
                <div class="form-group">
                  <label>Province * <small style="color:var(--accent)">(auto-load ongkir)</small></label>
                  <select id="provinceSelect" required onchange="handleDestinationChange(this.value)">
                    <option value="">${isLoadingProvinces ? '⏳ Memuat provinsi...' : 'Pilih Provinsi'}</option>
                    ${provinces.map(p => {
                      const pid = p.id || p.province_id;
                      const pname = p.name || p.province;
                      return `<option value="${pid}" ${selectedProvince === pname ? 'selected' : ''}>${pname}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>City / Kabupaten *</label>
                  <select id="citySelect" required onchange="handleCityChange(this.value)" ${cities.length === 0 ? 'disabled' : ''}>
                    <option value="">${isLoadingCities ? '⏳ Memuat kota...' : (selectedProvince ? 'Pilih Kota' : 'Pilih provinsi dulu')}</option>
                    ${cities.map(c => {
                      const cid = c.id || c.city_id;
                      const cname = c.name || c.city_name;
                      const ctype = c.type || '';
                      return `<option value="${cid}" ${selectedCity === cname ? 'selected' : ''}>${ctype ? ctype + ' ' : ''}${cname}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>District *</label>
                  <input type="text" required placeholder="Kebayoran Baru" />
                </div>
                <div class="form-group">
                  <label>Postal Code *</label>
                  <input type="text" required placeholder="12345" pattern="[0-9]{5}" />
                </div>
                <div class="form-group full">
                  <label>Courier Notes (Optional)</label>
                  <input type="text" placeholder="Landmark, gate color, etc." />
                </div>
              </div>
            </div>

            <!-- Step 3: Shipping Method (dari API) -->
            <div class="checkout-section">
              <h3><span class="step-num">3</span> Shipping Method</h3>
              ${isLoadingOngkir ? `
                <div style="text-align:center; padding:24px; color:var(--text-muted);">
                  <div style="font-size:24px; margin-bottom:8px;">⏳</div>
                  <strong>Menghitung ongkir dari Binderbyte...</strong><br>
                  <small>Mengambil tarif JNE, TIKI, POS Indonesia</small>
                </div>
              ` : !selectedCity ? `
                <div style="background:rgba(253,200,0,0.08); border:2px solid var(--accent); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">⚠️ Pilih Provinsi & Kota Tujuan</strong><br>
                  <small>Ongkir dihitung real-time via API Binderbyte (JNE, TIKI, POS)</small>
                </div>
              ` : availableShippings.length === 0 ? `
                <div style="background:rgba(220,38,38,0.08); border:2px solid var(--danger, #DC2626); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">❌ Tidak ada kurir tersedia</strong><br>
                  <small>Coba pilih kota lain atau hubungi CS kami</small>
                </div>
              ` : `
                <div style="margin-bottom:12px; font-size:13px; color:var(--text-muted);">
                  📍 ${selectedProvince} → ${selectedCity} — <strong style="color:var(--text)">${availableShippings.length} layanan tersedia</strong> (berat: 1kg)
                </div>
                <div class="shipping-methods">
                  ${availableShippings.map(s => `
                    <label class="shipping-method ${selectedShipping && selectedShipping.id === s.id ? 'active' : ''}">
                      <div class="shipping-method-left">
                        <input type="radio" name="shipping" value="${s.id}" ${selectedShipping && selectedShipping.id === s.id ? 'checked' : ''} onchange="handleSelect('${s.id}')" />
                        <div>
                          <strong>${s.name}</strong>
                          <span>${s.description ? s.description + ' · ' : ''}ETA: ${s.eta} hari</span>
                        </div>
                      </div>
                      <div class="price">${formatPrice(s.price)}</div>
                    </label>
                  `).join('')}
                </div>
              `}
            </div>

            <!-- Step 4 -->
            <div class="checkout-section">
              <h3><span class="step-num">4</span> Payment Method</h3>
              <div class="payment-methods">
                ${PAYMENTS.map(pm => `
                  <label class="payment-method ${selectedPayment === pm.id ? 'active' : ''}">
                    <input type="radio" name="payment" value="${pm.id}" ${selectedPayment === pm.id ? 'checked' : ''} onchange="selectPayment('${pm.id}')" />
                    <div class="pm-icon">${pm.icon}</div>
                    <div class="pm-info">
                      <strong>${pm.name}</strong>
                      <span>${pm.desc}</span>
                    </div>
                  </label>
                `).join('')}
              </div>
              <div style="background:rgba(0,255,157,0.05); border:1px solid rgba(0,255,157,0.2); padding:14px; border-radius:10px; margin-top:18px; font-size:13px; color:var(--text-muted); display:flex; gap:10px;">
                🔒 <span>Your payment is 100% secure with 256-bit SSL encryption. We never store your card details.</span>
              </div>
            </div>
          </form>

          <!-- Summary -->
          <div class="order-summary">
            <h3 style="font-size:16px; font-weight:700; margin-bottom:20px; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px">Order Summary</h3>
            <div class="order-items">
              ${items.map(item => {
                const p = PRODUCTS.find(x => x.id === item.id);
                return `
                  <div class="order-item">
                    <div class="order-item-img">${p.emoji}<span class="qty">${item.qty}</span></div>
                    <div class="order-item-info">
                      <h5>${p.name}</h5>
                      <span>${formatPrice(p.price)} × ${item.qty}</span>
                    </div>
                    <div class="order-item-price">${formatPrice(p.price * item.qty)}</div>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Ongkir${selectedShipping ? ' (' + selectedShipping.name + ')' : ''}</span>
              <span>${selectedShipping ? formatPrice(shipping) : '<em style="color:var(--text-muted)">Pilih kota tujuan</em>'}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <button type="submit" form="checkoutForm" class="btn btn-primary btn-block btn-lg" style="margin-top:18px" ${!selectedShipping ? 'disabled' : ''}>
              🔒 Pay Now
            </button>
            <div style="text-align:center; margin-top:10px; font-size:10px; color:var(--text-muted);">
              Powered by <strong>Binderbyte</strong> Ongkir API
            </div>
            <div style="text-align:center; margin-top:8px; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">
              By clicking Pay, you agree to our <a href="#" style="color:var(--accent)">Terms</a>
            </div>
          </div>
        </div>
      `;
    }

    function selectPayment(id) {
      selectedPayment = id;
      render();
    }

    function placeOrder(e) {
      e.preventDefault();
      if (!selectedShipping) {
        showToast('Pilih kota tujuan dan metode pengiriman dulu!', 'error');
        return;
      }
      const orderId = 'ERS-' + Date.now().toString().slice(-8);
      const total = Cart.total() + selectedShipping.price;
      const orderData = {
        id: orderId,
        total: total,
        shipping: selectedShipping,
        destination: { province: selectedProvince, city: selectedCity },
        payment: PAYMENTS.find(p => p.id === selectedPayment),
        items: Cart.get().length,
        date: new Date().toISOString()
      };
      localStorage.setItem('erset_last_order', JSON.stringify(orderData));
      Cart.clear();
      window.location.href = 'success.html?order=' + orderId;
    }
  </script>
</body>
</html>
