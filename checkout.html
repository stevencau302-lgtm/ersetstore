<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | ERSET GEAR LAB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>💳 Checkout</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <a href="cart.html">Cart</a>
        <span class="sep">/</span>
        <span>Checkout</span>
      </div>
    </div>
  </div>

  <section style="padding-top: 0">
    <div class="container">
      <div id="checkoutContent"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    // ============================================
    // API.CO.ID INTEGRATION - CEK ONGKIR DINAMIS
    // Docs: https://docs.api.co.id/products/indonesia-expedition-cost
    // ============================================
    // API key & kode desa asal diatur di halaman Admin Settings (admin.html)
    // dan disimpan di localStorage via helper Settings (lihat assets/js/app.js).
    const REGIONAL_BASE = 'https://use.api.co.id/regional/indonesia';
    const EXPEDITION_BASE = 'https://use.api.co.id/expedition';

    const getApiKey = () => Settings.get('apiCoIdKey');
    const getOriginVillageCode = () => Settings.get('originVillageCode');

    let selectedShipping = null;
    let selectedPayment = 'bca';

    // Cascade wilayah: Provinsi > Kabupaten > Kecamatan > Desa
    let provinces = [];
    let regencies = [];
    let districts = [];
    let villages = [];
    let selectedProvinceCode = '';
    let selectedRegencyCode = '';
    let selectedDistrictCode = '';
    let selectedVillageCode = '';
    let selectedProvinceName = '';
    let selectedRegencyName = '';
    let selectedVillageName = '';
    let villageCourierSupported = true;

    let availableShippings = [];
    let isLoadingProvinces = false;
    let isLoadingRegencies = false;
    let isLoadingDistricts = false;
    let isLoadingVillages = false;
    let isLoadingOngkir = false;

    // ===== HELPERS =====
    const getCode = (item) => String(item.code ?? item.id ?? item.village_code ?? '');
    const getName = (item) => item.name ?? item.village_name ?? item.regency_name ?? item.province_name ?? '';
    const getList = (json) => {
      if (Array.isArray(json)) return json;
      return json?.result ?? json?.data ?? [];
    };

    async function apiGet(url) {
      const key = getApiKey();
      if (!key) throw new Error('API key belum diatur. Buka halaman Admin Settings.');
      const res = await fetch(url, { headers: { 'x-api-co-id': key } });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json?.message || `HTTP ${res.status}`);
      return json;
    }

    // ===== API CALLS =====
    async function fetchProvinces() {
      isLoadingProvinces = true; render();
      try {
        provinces = getList(await apiGet(`${REGIONAL_BASE}/provinces`));
      } catch (err) {
        console.error('[ongkir] provinces:', err);
        showToast('Gagal memuat provinsi: ' + err.message, 'error');
      }
      isLoadingProvinces = false; render();
    }

    async function fetchRegencies(provinceCode) {
      isLoadingRegencies = true;
      regencies = []; districts = []; villages = [];
      selectedRegencyCode = ''; selectedDistrictCode = ''; selectedVillageCode = '';
      availableShippings = []; selectedShipping = null; render();
      try {
        regencies = getList(await apiGet(`${REGIONAL_BASE}/provinces/${provinceCode}/regencies`));
      } catch (err) {
        console.error('[ongkir] regencies:', err);
        showToast('Gagal memuat kabupaten/kota: ' + err.message, 'error');
      }
      isLoadingRegencies = false; render();
    }

    async function fetchDistricts(regencyCode) {
      isLoadingDistricts = true;
      districts = []; villages = [];
      selectedDistrictCode = ''; selectedVillageCode = '';
      availableShippings = []; selectedShipping = null; render();
      try {
        districts = getList(await apiGet(`${REGIONAL_BASE}/regencies/${regencyCode}/districts`));
      } catch (err) {
        console.error('[ongkir] districts:', err);
        showToast('Gagal memuat kecamatan: ' + err.message, 'error');
      }
      isLoadingDistricts = false; render();
    }

    async function fetchVillages(districtCode) {
      isLoadingVillages = true;
      villages = []; selectedVillageCode = '';
      availableShippings = []; selectedShipping = null; render();
      try {
        villages = getList(await apiGet(`${REGIONAL_BASE}/districts/${districtCode}/villages`));
      } catch (err) {
        console.error('[ongkir] villages:', err);
        showToast('Gagal memuat desa/kelurahan: ' + err.message, 'error');
      }
      isLoadingVillages = false; render();
    }

    // Estimasi berat: 1kg per item, minimal 1kg.
    function getOrderWeightKg() { return Math.max(1, Cart.count()); }

    async function fetchOngkir(destinationVillageCode) {
      const origin = getOriginVillageCode();
      const weight = getOrderWeightKg();
      const url = `${EXPEDITION_BASE}/shipping-cost`
        + `?origin_village_code=${origin}`
        + `&destination_village_code=${destinationVillageCode}`
        + `&weight=${weight}`;
      return getList(await apiGet(url));
    }

    // ===== HANDLERS =====
    async function handleProvinceChange(code) {
      const prov = provinces.find(p => getCode(p) === code);
      selectedProvinceCode = code;
      selectedProvinceName = prov ? getName(prov) : '';
      if (code) await fetchRegencies(code);
      else { regencies = []; districts = []; villages = []; render(); }
    }

    async function handleRegencyChange(code) {
      const reg = regencies.find(r => getCode(r) === code);
      selectedRegencyCode = code;
      selectedRegencyName = reg ? getName(reg) : '';
      if (code) await fetchDistricts(code);
      else { districts = []; villages = []; render(); }
    }

    async function handleDistrictChange(code) {
      selectedDistrictCode = code;
      if (code) await fetchVillages(code);
      else { villages = []; render(); }
    }

    async function handleVillageChange(code) {
      const village = villages.find(v => getCode(v) === code);
      selectedVillageCode = code;
      selectedVillageName = village ? getName(village) : '';
      villageCourierSupported = village ? (village.is_courier_support !== false) : true;
      availableShippings = []; selectedShipping = null;

      if (!code) { render(); return; }
      if (!villageCourierSupported) {
        render();
        showToast('Desa ini belum didukung untuk cek ongkir', 'error');
        return;
      }

      isLoadingOngkir = true; render();
      try {
        const result = await fetchOngkir(code);
        availableShippings = result
          .filter(c => Number(c.price) > 0)
          .map(c => ({
            id: c.courier_code,
            courier: c.courier_code,
            name: c.courier_name || c.courier_code,
            eta: c.estimation || '-',
            price: Number(c.price) || 0,
            weight: c.weight,
          }));
        if (availableShippings.length > 0) {
          selectedShipping = availableShippings.reduce(
            (min, s) => s.price < min.price ? s : min, availableShippings[0]
          );
        }
      } catch (err) {
        console.error('[ongkir] shipping-cost:', err);
        showToast('Gagal cek ongkir: ' + err.message, 'error');
      }
      isLoadingOngkir = false; render();
    }

    function handleSelect(shippingId) {
      const found = availableShippings.find(s => s.id === shippingId);
      if (found) selectedShipping = found;
      render();
    }

    const PAYMENTS = [
      { id: 'bca', icon: '🏦', name: 'BCA Virtual Account', desc: 'Pay via BCA m-Banking / KlikBCA' },
      { id: 'mandiri', icon: '🏛️', name: 'Mandiri Virtual Account', desc: 'Pay via Mandiri Online / Livin' },
      { id: 'bni', icon: '🏦', name: 'BNI Virtual Account', desc: 'Pay via BNI Mobile' },
      { id: 'gopay', icon: '💚', name: 'GoPay', desc: 'Pay via Gojek app' },
      { id: 'ovo', icon: '💜', name: 'OVO', desc: 'Pay via OVO app' },
      { id: 'dana', icon: '💙', name: 'DANA', desc: 'Pay via DANA app' },
      { id: 'qris', icon: '📱', name: 'QRIS', desc: 'Scan QR with any e-wallet' },
      { id: 'cod', icon: '💵', name: 'Cash on Delivery (COD)', desc: 'Pay when your order arrives' },
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      const items = Cart.get();
      if (items.length === 0) {
        document.getElementById('checkoutContent').innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Your Cart Is Empty</h3>
            <p>Add some gear to checkout</p>
            <a href="products.html" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }
      render();
      if (!getApiKey()) {
        showToast('API ongkir belum diatur — buka Admin Settings', 'error');
        return;
      }
      await fetchProvinces();
    });

    function render() {
      const items = Cart.get();
      const subtotal = Cart.total();
      const shipping = selectedShipping ? selectedShipping.price : 0;
      const total = subtotal + shipping;
      const noKey = !getApiKey();

      document.getElementById('checkoutContent').innerHTML = `
        <div class="checkout-layout">
          <form id="checkoutForm" onsubmit="placeOrder(event)">
            ${noKey ? `
              <div style="background:rgba(220,38,38,0.08); border:2px solid var(--danger, #DC2626); padding:16px; border-radius:10px; margin-bottom:20px; color:var(--text-muted);">
                <strong style="color:var(--text)">⚠️ API Ongkir belum dikonfigurasi</strong><br>
                <small>Atur API key di <a href="admin.html" style="color:var(--accent)">Admin Settings</a> dulu agar cek ongkir berfungsi.</small>
              </div>
            ` : ''}

            <!-- Step 1 -->
            <div class="checkout-section">
              <h3><span class="step-num">1</span> Contact Information</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Name *</label>
                  <input type="text" required placeholder="John Doe" />
                </div>
                <div class="form-group">
                  <label>Email *</label>
                  <input type="email" required placeholder="email@example.com" />
                </div>
                <div class="form-group">
                  <label>Phone / WhatsApp *</label>
                  <input type="tel" required placeholder="08xxxxxxxxxx" />
                </div>
              </div>
            </div>

            <!-- Step 2: Shipping Address + Ongkir (cascade desa) -->
            <div class="checkout-section">
              <h3><span class="step-num">2</span> Shipping Address</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Address *</label>
                  <textarea required placeholder="Street name, house number, RT/RW..."></textarea>
                </div>
                <div class="form-group">
                  <label>Provinsi * <small style="color:var(--accent)">(cek ongkir per desa)</small></label>
                  <select id="provinceSelect" required onchange="handleProvinceChange(this.value)" ${noKey ? 'disabled' : ''}>
                    <option value="">${isLoadingProvinces ? '⏳ Memuat provinsi...' : 'Pilih Provinsi'}</option>
                    ${provinces.map(p => {
                      const code = getCode(p);
                      return `<option value="${code}" ${selectedProvinceCode === code ? 'selected' : ''}>${getName(p)}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Kabupaten / Kota *</label>
                  <select id="regencySelect" required onchange="handleRegencyChange(this.value)" ${regencies.length === 0 ? 'disabled' : ''}>
                    <option value="">${isLoadingRegencies ? '⏳ Memuat...' : (selectedProvinceCode ? 'Pilih Kabupaten/Kota' : 'Pilih provinsi dulu')}</option>
                    ${regencies.map(r => {
                      const code = getCode(r);
                      return `<option value="${code}" ${selectedRegencyCode === code ? 'selected' : ''}>${getName(r)}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Kecamatan *</label>
                  <select id="districtSelect" required onchange="handleDistrictChange(this.value)" ${districts.length === 0 ? 'disabled' : ''}>
                    <option value="">${isLoadingDistricts ? '⏳ Memuat...' : (selectedRegencyCode ? 'Pilih Kecamatan' : 'Pilih kab/kota dulu')}</option>
                    ${districts.map(d => {
                      const code = getCode(d);
                      return `<option value="${code}" ${selectedDistrictCode === code ? 'selected' : ''}>${getName(d)}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Desa / Kelurahan * <small style="color:var(--text-muted)">(menentukan ongkir)</small></label>
                  <select id="villageSelect" required onchange="handleVillageChange(this.value)" ${villages.length === 0 ? 'disabled' : ''}>
                    <option value="">${isLoadingVillages ? '⏳ Memuat...' : (selectedDistrictCode ? 'Pilih Desa/Kelurahan' : 'Pilih kecamatan dulu')}</option>
                    ${villages.map(v => {
                      const code = getCode(v);
                      const supported = v.is_courier_support !== false;
                      return `<option value="${code}" ${selectedVillageCode === code ? 'selected' : ''}>${getName(v)}${supported ? '' : ' (belum didukung)'}</option>`;
                    }).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Postal Code *</label>
                  <input type="text" required placeholder="12345" pattern="[0-9]{5}" />
                </div>
                <div class="form-group full">
                  <label>Courier Notes (Optional)</label>
                  <input type="text" placeholder="Landmark, gate color, etc." />
                </div>
              </div>
            </div>

            <!-- Step 3: Shipping Method (dari api.co.id) -->
            <div class="checkout-section">
              <h3><span class="step-num">3</span> Shipping Method</h3>
              ${isLoadingOngkir ? `
                <div style="text-align:center; padding:24px; color:var(--text-muted);">
                  <div style="font-size:24px; margin-bottom:8px;">⏳</div>
                  <strong>Menghitung ongkir via api.co.id...</strong><br>
                  <small>Mengambil tarif JNE, SiCepat, J&T, dll</small>
                </div>
              ` : !selectedVillageCode ? `
                <div style="background:rgba(253,200,0,0.08); border:2px solid var(--accent); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">⚠️ Lengkapi Alamat Tujuan</strong><br>
                  <small>Pilih sampai Desa/Kelurahan — ongkir dihitung real-time per kode desa</small>
                </div>
              ` : !villageCourierSupported ? `
                <div style="background:rgba(220,38,38,0.08); border:2px solid var(--danger, #DC2626); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">❌ Desa belum didukung kurir</strong><br>
                  <small>Pilih desa lain, atau ajukan aktivasi wilayah di dashboard api.co.id</small>
                </div>
              ` : availableShippings.length === 0 ? `
                <div style="background:rgba(220,38,38,0.08); border:2px solid var(--danger, #DC2626); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">❌ Tidak ada kurir tersedia</strong><br>
                  <small>Coba pilih desa lain atau hubungi CS kami</small>
                </div>
              ` : `
                <div style="margin-bottom:12px; font-size:13px; color:var(--text-muted);">
                  📍 ${selectedRegencyName ? selectedRegencyName + ', ' : ''}${selectedProvinceName} → ${selectedVillageName} — <strong style="color:var(--text)">${availableShippings.length} kurir tersedia</strong> (berat: ${getOrderWeightKg()}kg)
                </div>
                <div class="shipping-methods">
                  ${availableShippings.map(s => `
                    <label class="shipping-method ${selectedShipping && selectedShipping.id === s.id ? 'active' : ''}">
                      <div class="shipping-method-left">
                        <input type="radio" name="shipping" value="${s.id}" ${selectedShipping && selectedShipping.id === s.id ? 'checked' : ''} onchange="handleSelect('${s.id}')" />
                        <div>
                          <strong>${s.name}</strong>
                          <span>ETA: ${s.eta}</span>
                        </div>
                      </div>
                      <div class="price">${formatPrice(s.price)}</div>
                    </label>
                  `).join('')}
                </div>
              `}
            </div>

            <!-- Step 4 -->
            <div class="checkout-section">
              <h3><span class="step-num">4</span> Payment Method</h3>
              <div class="payment-methods">
                ${PAYMENTS.map(pm => `
                  <label class="payment-method ${selectedPayment === pm.id ? 'active' : ''}">
                    <input type="radio" name="payment" value="${pm.id}" ${selectedPayment === pm.id ? 'checked' : ''} onchange="selectPayment('${pm.id}')" />
                    <div class="pm-icon">${pm.icon}</div>
                    <div class="pm-info">
                      <strong>${pm.name}</strong>
                      <span>${pm.desc}</span>
                    </div>
                  </label>
                `).join('')}
              </div>
              <div style="background:rgba(0,255,157,0.05); border:1px solid rgba(0,255,157,0.2); padding:14px; border-radius:10px; margin-top:18px; font-size:13px; color:var(--text-muted); display:flex; gap:10px;">
                🔒 <span>Your payment is 100% secure with 256-bit SSL encryption. We never store your card details.</span>
              </div>
            </div>
          </form>

          <!-- Summary -->
          <div class="order-summary">
            <h3 style="font-size:16px; font-weight:700; margin-bottom:20px; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px">Order Summary</h3>
            <div class="order-items">
              ${items.map(item => {
                const p = PRODUCTS.find(x => x.id === item.id);
                return `
                  <div class="order-item">
                    <div class="order-item-img">${p.emoji}<span class="qty">${item.qty}</span></div>
                    <div class="order-item-info">
                      <h5>${p.name}</h5>
                      <span>${formatPrice(p.price)} × ${item.qty}</span>
                    </div>
                    <div class="order-item-price">${formatPrice(p.price * item.qty)}</div>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Ongkir${selectedShipping ? ' (' + selectedShipping.name + ')' : ''}</span>
              <span>${selectedShipping ? formatPrice(shipping) : '<em style="color:var(--text-muted)">Pilih desa tujuan</em>'}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <button type="submit" form="checkoutForm" class="btn btn-primary btn-block btn-lg" style="margin-top:18px" ${!selectedShipping ? 'disabled' : ''}>
              🔒 Pay Now
            </button>
            <div style="text-align:center; margin-top:10px; font-size:10px; color:var(--text-muted);">
              Powered by <strong>api.co.id</strong> Ongkir API
            </div>
            <div style="text-align:center; margin-top:8px; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">
              By clicking Pay, you agree to our <a href="#" style="color:var(--accent)">Terms</a>
            </div>
          </div>
        </div>
      `;
    }

    function selectPayment(id) {
      selectedPayment = id;
      render();
    }

    function placeOrder(e) {
      e.preventDefault();
      if (!selectedShipping) {
        showToast('Pilih desa tujuan dan metode pengiriman dulu!', 'error');
        return;
      }
      const orderId = 'ERS-' + Date.now().toString().slice(-8);
      const total = Cart.total() + selectedShipping.price;
      const orderData = {
        id: orderId,
        total: total,
        shipping: selectedShipping,
        destination: {
          province: selectedProvinceName,
          regency: selectedRegencyName,
          village: selectedVillageName,
          village_code: selectedVillageCode
        },
        payment: PAYMENTS.find(p => p.id === selectedPayment),
        items: Cart.get().length,
        date: new Date().toISOString()
      };
      localStorage.setItem('erset_last_order', JSON.stringify(orderData));
      Cart.clear();
      window.location.href = 'success.html?order=' + orderId;
    }
  </script>
</body>
</html>
