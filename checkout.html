<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | ERSET GEAR LAB</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>💳 Checkout</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <a href="cart.html">Cart</a>
        <span class="sep">/</span>
        <span>Checkout</span>
      </div>
    </div>
  </div>

  <section style="padding-top: 0">
    <div class="container">
      <div id="checkoutContent"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    let selectedShipping = null;
    let selectedPayment = 'bca';
    let selectedProvince = '';
    let availableShippings = [];

    // Ongkir rates per province (simulated, price multiplier based on distance from Jakarta)
    const PROVINCE_RATES = {
      'DKI Jakarta': 1.0,
      'Jawa Barat': 1.1,
      'Banten': 1.1,
      'Jawa Tengah': 1.3,
      'DI Yogyakarta': 1.3,
      'Jawa Timur': 1.5,
      'Bali': 1.8,
      'Sumatera Utara': 2.2,
      'Sumatera Selatan': 2.0,
      'Other': 2.5,
    };

    // Base shipping options (prices will be multiplied by province rate)
    const BASE_SHIPPINGS = [
      { id: 'reguler', name: 'JNE Reguler', eta: '2-3 business days', basePrice: 12000 },
      { id: 'yes', name: 'JNE YES (Next Day)', eta: '1 business day', basePrice: 25000 },
      { id: 'sicepat', name: 'SiCepat REG', eta: '2-3 business days', basePrice: 11000 },
      { id: 'jnt', name: 'J&T Express', eta: '2-4 business days', basePrice: 10000 },
      { id: 'ninja', name: 'Ninja Xpress', eta: '2-3 business days', basePrice: 10500 },
      { id: 'instant', name: 'GoSend Instant (Same Day)', eta: 'Today, Jabodetabek only', basePrice: 35000, jabodetabekOnly: true },
    ];

    // Calculate shipping options based on destination province
    function calculateShippingOptions(province) {
      console.log('[ongkir] calculateShippingOptions called with province:', province);
      const rate = PROVINCE_RATES[province] || 2.5;
      console.log('[ongkir] Rate for province:', rate);

      return BASE_SHIPPINGS
        .filter(s => {
          // GoSend only available for Jabodetabek
          if (s.jabodetabekOnly) {
            return ['DKI Jakarta', 'Banten', 'Jawa Barat'].includes(province);
          }
          return true;
        })
        .map(s => ({
          id: s.id,
          name: s.name,
          eta: s.eta,
          price: Math.round(s.basePrice * rate / 1000) * 1000, // Round to nearest 1000
        }));
    }

    // Called when province/destination changes
    function handleDestinationChange(province) {
      console.log('[ongkir] handleDestinationChange called with:', province);
      alert('[DEBUG] handleDestinationChange fired! Province: ' + province);

      selectedProvince = province;
      availableShippings = calculateShippingOptions(province);
      console.log('[ongkir] Available shippings calculated:', availableShippings);

      // Auto-select cheapest option
      if (availableShippings.length > 0) {
        selectedShipping = availableShippings.reduce((min, s) => s.price < min.price ? s : min, availableShippings[0]);
        console.log('[ongkir] Auto-selected cheapest shipping:', selectedShipping);
      } else {
        selectedShipping = null;
      }

      render();
    }

    // Called when user selects a shipping method
    function handleSelect(shippingId) {
      console.log('[ongkir] handleSelect called with:', shippingId);
      alert('[DEBUG] handleSelect fired! Shipping ID: ' + shippingId);

      const found = availableShippings.find(s => s.id === shippingId);
      if (found) {
        selectedShipping = found;
        console.log('[ongkir] Selected shipping updated to:', selectedShipping);
      } else {
        console.warn('[ongkir] Shipping not found for id:', shippingId);
      }
      render();
    }

    const PAYMENTS = [
      { id: 'bca', icon: '🏦', name: 'BCA Virtual Account', desc: 'Pay via BCA m-Banking / KlikBCA' },
      { id: 'mandiri', icon: '🏛️', name: 'Mandiri Virtual Account', desc: 'Pay via Mandiri Online / Livin' },
      { id: 'bni', icon: '🏦', name: 'BNI Virtual Account', desc: 'Pay via BNI Mobile' },
      { id: 'gopay', icon: '💚', name: 'GoPay', desc: 'Pay via Gojek app' },
      { id: 'ovo', icon: '💜', name: 'OVO', desc: 'Pay via OVO app' },
      { id: 'dana', icon: '💙', name: 'DANA', desc: 'Pay via DANA app' },
      { id: 'qris', icon: '📱', name: 'QRIS', desc: 'Scan QR with any e-wallet' },
      { id: 'cod', icon: '💵', name: 'Cash on Delivery (COD)', desc: 'Pay when your order arrives' },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const items = Cart.get();
      if (items.length === 0) {
        document.getElementById('checkoutContent').innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Your Cart Is Empty</h3>
            <p>Add some gear to checkout</p>
            <a href="products.html" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }
      render();
    });

    function render() {
      const items = Cart.get();
      const subtotal = Cart.total();
      const shipping = selectedShipping ? selectedShipping.price : 0;
      const total = subtotal + shipping;

      document.getElementById('checkoutContent').innerHTML = `
        <div class="checkout-layout">
          <form id="checkoutForm" onsubmit="placeOrder(event)">
            <!-- Step 1 -->
            <div class="checkout-section">
              <h3><span class="step-num">1</span> Contact Information</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Name *</label>
                  <input type="text" required placeholder="John Doe" />
                </div>
                <div class="form-group">
                  <label>Email *</label>
                  <input type="email" required placeholder="email@example.com" />
                </div>
                <div class="form-group">
                  <label>Phone / WhatsApp *</label>
                  <input type="tel" required placeholder="08xxxxxxxxxx" />
                </div>
              </div>
            </div>

            <!-- Step 2 -->
            <div class="checkout-section">
              <h3><span class="step-num">2</span> Shipping Address</h3>
              <div class="form-grid">
                <div class="form-group full">
                  <label>Full Address *</label>
                  <textarea required placeholder="Street name, house number, RT/RW..."></textarea>
                </div>
                <div class="form-group">
                  <label>Province * <small style="color:var(--accent)">(determines shipping cost)</small></label>
                  <select id="provinceSelect" required onchange="handleDestinationChange(this.value)">
                    <option value="">Select Province</option>
                    <option ${selectedProvince === 'DKI Jakarta' ? 'selected' : ''}>DKI Jakarta</option>
                    <option ${selectedProvince === 'Jawa Barat' ? 'selected' : ''}>Jawa Barat</option>
                    <option ${selectedProvince === 'Jawa Tengah' ? 'selected' : ''}>Jawa Tengah</option>
                    <option ${selectedProvince === 'Jawa Timur' ? 'selected' : ''}>Jawa Timur</option>
                    <option ${selectedProvince === 'DI Yogyakarta' ? 'selected' : ''}>DI Yogyakarta</option>
                    <option ${selectedProvince === 'Banten' ? 'selected' : ''}>Banten</option>
                    <option ${selectedProvince === 'Bali' ? 'selected' : ''}>Bali</option>
                    <option ${selectedProvince === 'Sumatera Utara' ? 'selected' : ''}>Sumatera Utara</option>
                    <option ${selectedProvince === 'Sumatera Selatan' ? 'selected' : ''}>Sumatera Selatan</option>
                    <option ${selectedProvince === 'Other' ? 'selected' : ''}>Other</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>City *</label>
                  <input type="text" required placeholder="Jakarta Selatan" />
                </div>
                <div class="form-group">
                  <label>District *</label>
                  <input type="text" required placeholder="Kebayoran Baru" />
                </div>
                <div class="form-group">
                  <label>Postal Code *</label>
                  <input type="text" required placeholder="12345" pattern="[0-9]{5}" />
                </div>
                <div class="form-group full">
                  <label>Courier Notes (Optional)</label>
                  <input type="text" placeholder="Landmark, gate color, etc." />
                </div>
              </div>
            </div>

            <!-- Step 3 -->
            <div class="checkout-section">
              <h3><span class="step-num">3</span> Shipping Method</h3>
              ${!selectedProvince ? `
                <div style="background:rgba(253,200,0,0.08); border:2px solid var(--accent); padding:18px; border-radius:10px; text-align:center; color:var(--text-muted);">
                  <strong style="color:var(--text)">⚠️ Pilih Provinsi Tujuan Dulu</strong><br>
                  <small>Ongkir akan dihitung otomatis setelah provinsi dipilih di Step 2</small>
                </div>
              ` : `
                <div style="margin-bottom:12px; font-size:13px; color:var(--text-muted);">
                  📍 Tujuan: <strong style="color:var(--text)">${selectedProvince}</strong> — ${availableShippings.length} kurir tersedia
                </div>
                <div class="shipping-methods">
                  ${availableShippings.map(s => `
                    <label class="shipping-method ${selectedShipping && selectedShipping.id === s.id ? 'active' : ''}">
                      <div class="shipping-method-left">
                        <input type="radio" name="shipping" value="${s.id}" ${selectedShipping && selectedShipping.id === s.id ? 'checked' : ''} onchange="handleSelect('${s.id}')" />
                        <div>
                          <strong>${s.name}</strong>
                          <span>ETA: ${s.eta}</span>
                        </div>
                      </div>
                      <div class="price">${formatPrice(s.price)}</div>
                    </label>
                  `).join('')}
                </div>
              `}
            </div>

            <!-- Step 4 -->
            <div class="checkout-section">
              <h3><span class="step-num">4</span> Payment Method</h3>
              <div class="payment-methods">
                ${PAYMENTS.map(pm => `
                  <label class="payment-method ${selectedPayment === pm.id ? 'active' : ''}">
                    <input type="radio" name="payment" value="${pm.id}" ${selectedPayment === pm.id ? 'checked' : ''} onchange="selectPayment('${pm.id}')" />
                    <div class="pm-icon">${pm.icon}</div>
                    <div class="pm-info">
                      <strong>${pm.name}</strong>
                      <span>${pm.desc}</span>
                    </div>
                  </label>
                `).join('')}
              </div>
              <div style="background:rgba(0,255,157,0.05); border:1px solid rgba(0,255,157,0.2); padding:14px; border-radius:10px; margin-top:18px; font-size:13px; color:var(--text-muted); display:flex; gap:10px;">
                🔒 <span>Your payment is 100% secure with 256-bit SSL encryption. We never store your card details.</span>
              </div>
            </div>
          </form>

          <!-- Summary -->
          <div class="order-summary">
            <h3 style="font-size:16px; font-weight:700; margin-bottom:20px; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px">Order Summary</h3>
            <div class="order-items">
              ${items.map(item => {
                const p = PRODUCTS.find(x => x.id === item.id);
                return `
                  <div class="order-item">
                    <div class="order-item-img">${p.emoji}<span class="qty">${item.qty}</span></div>
                    <div class="order-item-info">
                      <h5>${p.name}</h5>
                      <span>${formatPrice(p.price)} × ${item.qty}</span>
                    </div>
                    <div class="order-item-price">${formatPrice(p.price * item.qty)}</div>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping${selectedShipping ? ' (' + selectedShipping.name + ')' : ''}</span>
              <span>${selectedShipping ? formatPrice(shipping) : '<em style=\"color:var(--text-muted)\">Pilih provinsi</em>'}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <button type="submit" form="checkoutForm" class="btn btn-primary btn-block btn-lg" style="margin-top:18px">
              🔒 Pay Now
            </button>
            <div style="text-align:center; margin-top:14px; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">
              By clicking Pay, you agree to our <a href="#" style="color:var(--accent)">Terms</a>
            </div>
          </div>
        </div>
      `;
    }

    function selectPayment(id) {
      selectedPayment = id;
      render();
    }

    function placeOrder(e) {
      e.preventDefault();
      if (!selectedShipping) {
        showToast('Pilih provinsi tujuan dan metode pengiriman dulu!', 'error');
        return;
      }
      const orderId = 'ERS-' + Date.now().toString().slice(-8);
      const total = Cart.total() + selectedShipping.price;
      const orderData = {
        id: orderId,
        total: total,
        shipping: selectedShipping,
        payment: PAYMENTS.find(p => p.id === selectedPayment),
        items: Cart.get().length,
        date: new Date().toISOString()
      };
      localStorage.setItem('erset_last_order', JSON.stringify(orderData));
      Cart.clear();
      window.location.href = 'success.html?order=' + orderId;
    }
  </script>
</body>
</html>
