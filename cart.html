<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang Belanja | ERSET STORE</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>🛒 Keranjang Belanja</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <span>Keranjang</span>
      </div>
    </div>
  </div>

  <section style="padding-top: 0">
    <div class="container">
      <div id="cartContent"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    let appliedCoupon = null;
    const COUPONS = {
      'ERSET10': { discount: 0.1, label: 'Diskon 10%' },
      'NEWUSER': { discount: 0.15, label: 'Diskon 15% New User' },
      'FLASH50K': { discount: 50000, type: 'flat', label: 'Potongan Rp 50.000' }
    };

    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const items = Cart.get();
      const container = document.getElementById('cartContent');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Keranjang Anda Kosong</h3>
            <p>Belum ada produk di keranjang. Yuk mulai belanja sekarang!</p>
            <a href="products.html" class="btn btn-primary">Mulai Belanja</a>
          </div>
        `;
        return;
      }

      const subtotal = Cart.total();
      const shipping = subtotal >= 200000 ? 0 : 15000;
      let discount = 0;
      if (appliedCoupon) {
        const c = COUPONS[appliedCoupon];
        discount = c.type === 'flat' ? c.discount : Math.round(subtotal * c.discount);
      }
      const total = subtotal + shipping - discount;

      container.innerHTML = `
        <div class="cart-layout">
          <div>
            <div class="cart-items">
              ${items.map(item => {
                const p = PRODUCTS.find(x => x.id === item.id);
                if (!p) return '';
                return `
                  <div class="cart-item">
                    <div class="cart-item-img">${p.emoji}</div>
                    <div class="cart-item-info">
                      <h4>${p.name}</h4>
                      <span>${p.category} • SKU: ERS-${p.id.toString().padStart(4,'0')}</span>
                    </div>
                    <div class="qty-input">
                      <button onclick="updateQty(${p.id}, -1)">−</button>
                      <input type="number" value="${item.qty}" readonly />
                      <button onclick="updateQty(${p.id}, 1)">+</button>
                    </div>
                    <div class="cart-item-price">${formatPrice(p.price * item.qty)}</div>
                    <button class="cart-item-remove" onclick="removeItem(${p.id})" aria-label="Hapus">
                      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                  </div>
                `;
              }).join('')}
            </div>
            <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap">
              <a href="products.html" class="btn btn-secondary">← Lanjut Belanja</a>
              <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger)" onclick="clearAllCart()">Kosongkan Keranjang</button>
            </div>
          </div>

          <div class="cart-summary">
            <h3>Ringkasan Pesanan</h3>
            <div class="summary-row">
              <span>Subtotal (${Cart.count()} item)</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Ongkos Kirim</span>
              <span>${shipping === 0 ? '<span style="color:var(--success); font-weight:600">GRATIS</span>' : formatPrice(shipping)}</span>
            </div>
            ${discount > 0 ? `
              <div class="summary-row" style="color:var(--success)">
                <span>Diskon (${appliedCoupon})</span>
                <span>-${formatPrice(discount)}</span>
              </div>
            ` : ''}

            <div class="coupon-row">
              <input type="text" id="couponInput" placeholder="Kode promo (ERSET10, NEWUSER, FLASH50K)" value="${appliedCoupon || ''}" />
              <button class="btn btn-secondary btn-sm" onclick="applyCoupon()">Pakai</button>
            </div>

            ${shipping > 0 ? `<div style="background:var(--bg-soft); padding:10px 14px; border-radius:8px; font-size:12px; color:var(--text-muted); margin-bottom:12px">💡 Belanja ${formatPrice(200000 - subtotal)} lagi untuk gratis ongkir!</div>` : ''}

            <div class="summary-row total">
              <span>Total</span>
              <span class="price">${formatPrice(total)}</span>
            </div>
            <a href="checkout.html" class="btn btn-primary btn-block btn-lg" style="margin-top:16px">Lanjut ke Checkout →</a>
            <div style="text-align:center; margin-top:14px; font-size:12px; color:var(--text-muted)">
              🔒 Pembayaran 100% Aman & Terenkripsi
            </div>
          </div>
        </div>
      `;
    }

    function updateQty(id, delta) {
      const items = Cart.get();
      const item = items.find(i => i.id === id);
      if (item) {
        Cart.update(id, item.qty + delta);
        renderCart();
      }
    }

    function removeItem(id) {
      if (confirm('Hapus produk dari keranjang?')) {
        Cart.remove(id);
        renderCart();
        showToast('Produk dihapus dari keranjang');
      }
    }

    function clearAllCart() {
      if (confirm('Yakin ingin mengosongkan keranjang?')) {
        Cart.clear();
        appliedCoupon = null;
        renderCart();
        showToast('Keranjang dikosongkan');
      }
    }

    function applyCoupon() {
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      if (!code) { showToast('Masukkan kode promo', 'error'); return; }
      if (COUPONS[code]) {
        appliedCoupon = code;
        showToast(`Kupon diterapkan: ${COUPONS[code].label}`, 'success');
        renderCart();
      } else {
        showToast('Kode promo tidak valid', 'error');
      }
    }
  </script>
</body>
</html>
