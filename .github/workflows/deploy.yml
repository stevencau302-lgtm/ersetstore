name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # SPA fallback for GitHub Pages: copy index.html as 404.html
      - run: cp dist/index.html dist/404.html

      # Prevent Jekyll processing on Pages
      - run: touch dist/.nojekyll

      # Method 1: Upload as Pages artifact (works when Pages source = "GitHub Actions")
      - uses: actions/configure-pages@v5
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # Method 2: Push to gh-pages branch (works when Pages source = "Deploy from branch: gh-pages")
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
